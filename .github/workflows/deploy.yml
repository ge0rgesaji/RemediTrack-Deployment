name: RemediTrack CI/CD

on:
  push:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/requirements.txt
          
      - name: Run Django Tests
        run: |
          cd src
          echo "SECRET_KEY=testing" > .env
          python manage.py test vulnerabilities

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Manual SSH Key Setup
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
      - name: Deploy to AWS via Bastion
        run: |
          # 1. Setup SSH Config
          cat <<EOF > ~/.ssh/config
          Host bastion
            HostName ${{ secrets.BASTION_IP }}
            User ubuntu
            IdentityFile ~/.ssh/id_rsa
            StrictHostKeyChecking no

          Host app-server
            HostName ${{ secrets.SERVER_IP }}
            User ubuntu
            ProxyJump bastion
            StrictHostKeyChecking no
          EOF

          # 2. Transfer code
          rsync -avz --exclude '.git' ./ app-server:/home/ubuntu/Remeditrack-Devops/

          # 3. Create .env file
          echo "${{ secrets.ENV_FILE }}" > .env.tmp
          scp .env.tmp app-server:/home/ubuntu/Remeditrack-Devops/src/.env
          rm .env.tmp

          # 4. Restart containers
          ssh app-server "cd ~/Remeditrack-Devops/src && docker compose up -d --build && docker compose exec -T web python manage.py migrate --noinput && docker compose exec -T web python manage.py collectstatic --noinput"
