{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-danger">
            <div class="card-header bg-danger text-white">
                <h4 class="mb-0">Confirm Delete User</h4>
            </div>
            <div class="card-body text-center">
                <p class="lead mb-4">Are you sure you want to delete user: <strong>{{ object.username }}</strong>?</p>
                <div class="alert alert-warning small">
                    <i class="bi bi-exclamation-triangle"></i> 
                    Warning: This action cannot be undone. All data associated with this user may be affected.
                </div>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-center gap-3 mt-4">
                        <a href="{% url 'user_list' %}" class="btn btn-outline-secondary px-4">Cancel</a>
                        <button type="submit" class="btn btn-danger px-4">Confirm Delete</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
